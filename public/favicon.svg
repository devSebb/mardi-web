<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="#08070b"/>
  <!-- Bowl outline — braille-style 1px pixel ring -->
  <g fill="#f3f1ec">
    <!-- top rim -->
    <rect x="11" y="5" width="2" height="2"/>
    <rect x="13" y="4" width="6" height="2"/>
    <rect x="19" y="5" width="2" height="2"/>
    <!-- right side -->
    <rect x="21" y="6" width="2" height="2"/>
    <rect x="23" y="7" width="2" height="2"/>
    <rect x="25" y="9" width="2" height="2"/>
    <rect x="26" y="11" width="2" height="4"/>
    <rect x="26" y="15" width="2" height="6"/>
    <rect x="25" y="21" width="2" height="2"/>
    <rect x="23" y="23" width="2" height="2"/>
    <rect x="20" y="25" width="3" height="2"/>
    <!-- bottom -->
    <rect x="12" y="26" width="8" height="2"/>
    <!-- left side -->
    <rect x="9" y="25" width="3" height="2"/>
    <rect x="7" y="23" width="2" height="2"/>
    <rect x="5" y="21" width="2" height="2"/>
    <rect x="4" y="15" width="2" height="6"/>
    <rect x="4" y="11" width="2" height="4"/>
    <rect x="5" y="9" width="2" height="2"/>
    <rect x="7" y="7" width="2" height="2"/>
    <rect x="9" y="6" width="2" height="2"/>
  </g>
  <!-- Water line — pink ripple -->
  <g fill="#ff2ecc">
    <rect x="7" y="10" width="2" height="1"/>
    <rect x="10" y="11" width="2" height="1"/>
    <rect x="13" y="10" width="3" height="1"/>
    <rect x="17" y="11" width="2" height="1"/>
    <rect x="20" y="10" width="3" height="1"/>
    <rect x="24" y="11" width="1" height="1"/>
  </g>
  <!-- Fish body -->
  <g fill="#f3f1ec">
    <rect x="13" y="17" width="6" height="2"/>
    <rect x="14" y="15" width="4" height="2"/>
    <rect x="14" y="19" width="4" height="2"/>
    <rect x="19" y="17" width="2" height="2"/>
    <!-- tail -->
    <rect x="10" y="16" width="2" height="4"/>
    <rect x="12" y="17" width="2" height="2"/>
    <!-- eye (pink) -->
    <rect x="17" y="17" width="1" height="1" fill="#ff2ecc"/>
  </g>
  <!-- Bubbles -->
  <g fill="#b7b3aa">
    <rect x="22" y="13" width="1" height="1"/>
    <rect x="23" y="15" width="1" height="1"/>
  </g>
</svg>
